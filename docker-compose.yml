services:
  postgres:
    image: postgres:16-alpine
    container_name: repolens_postgres
    environment:
      POSTGRES_USER: repolens
      POSTGRES_PASSWORD: repolens
      POSTGRES_DB: repolens_db
    ports:
      - "5432:5432"
    volumes:
      - repolens_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: repolens_redis
    ports:
      - "6379:6379"

volumes:
  repolens_postgres_data: